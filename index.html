<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Quiz Builder MVP</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      .quiz-card {
        transition: transform 0.2s;
      }
      .correct-answer {
        background-color: #d4edda;
        border: 1px solid #c3e6cb;
      }
      .wrong-answer {
        background-color: #f8d7da;
        border: 1px solid #f5c6cb;
        color: #721c24;
      }
    </style>
  </head>
  <body class="bg-light">
    <div class="container py-5">
      <div class="row justify-content-center">
        <div class="col-md-8">
          <div id="setup-card" class="card shadow-sm mb-4">
            <div class="card-body">
              <h3 class="mb-3">Enter Quiz Topic</h3>
              <div class="input-group">
                <input
                  type="text"
                  id="topic-input"
                  class="form-control"
                  placeholder="e.g., Quantum Physics"
                />
                <button id="generate-btn" class="btn btn-primary">
                  Generate 5 Questions
                </button>
              </div>
            </div>
          </div>

          <div id="history-section" class="mt-5">
            <h3>Past Quiz Results</h3>
            <div class="card shadow-sm">
              <div class="card-body">
                <table class="table table-hover">
                  <thead>
                    <tr>
                      <th>Topic</th>
                      <th>Score</th>
                      <th>Date</th>
                    </tr>
                  </thead>
                  <tbody id="history-table-body"></tbody>
                </table>
              </div>
            </div>
          </div>

          <div id="quiz-container" class="d-none">
            <form id="quiz-form"></form>
            <button
              id="submit-quiz-btn"
              class="btn btn-success w-100 mt-3 py-2"
            >
              Submit Answers
            </button>
          </div>

          <div id="result-card" class="card shadow-sm d-none mt-4 text-center">
            <div class="card-body">
              <h2>Your Score: <span id="final-score"></span>/5</h2>
              <button
                onclick="location.reload()"
                class="btn btn-outline-secondary mt-3"
              >
                Start New Quiz
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
      $(document).ready(function () {
        loadHistory();
      });

      let quizData = [];

      $("#generate-btn").click(function () {
        const topic = $("#topic-input").val();
        if (!topic) return alert("Please enter a topic.");

        $(this).prop("disabled", true).text("Generating Quiz...");

        $("#history-section").fadeOut();

        $.post("api/generate.php", { topic: topic }, function (response) {
          if (response.questions) {
            quizData = response.questions;
            renderQuiz();
          } else {
            alert("Error generating quiz. Please try again.");
            $("#history-section").fadeIn(); // Bring it back if generation fails
            $(this).prop("disabled", false).text("Generate 5 Questions");
          }
        }).fail(function () {
          alert("Server error.");
          location.reload();
        });
      });

      function renderQuiz() {
        let html = "";
        quizData.forEach((item, i) => {
          html += `
      <div class="card mb-3 quiz-card shadow-sm" id="card-${i}">
      <div class="card-body">
      <h5>${i + 1}. ${item.q}</h5>
      <div class="mt-3">
      ${Object.entries(item.options)
        .map(
          ([key, text]) => `
        <div class="form-check p-2 rounded">
        <input class="form-check-input ms-1" type="radio" name="q${i}" value="${key}" id="q${i}${key}">
        <label class="form-check-label ms-2" for="q${i}${key}">${key}: ${text}</label>
        </div>
        `,
        )
        .join("")}
      </div>

      <!-- Explanation will appear here -->
      <div class="explanation mt-3 text-muted d-none"></div>

      </div>
      </div>`;
        });
        $("#quiz-form").html(html);
        $("#setup-card").addClass("d-none");
        $("#history-section").addClass("d-none");
        $("#quiz-container").removeClass("d-none");
      }

      $("#submit-quiz-btn").click(function () {
        let score = 0;
        let userSelections = {};

        quizData.forEach((item, i) => {
          const selectedValue = $(`input[name="q${i}"]:checked`).val();
          userSelections[i] = selectedValue || "No Answer";

          $(`#card-${i} .form-check`).each(function () {
            const currentInput = $(this).find("input");
            const val = currentInput.val();

            if (val === item.correct) {
              $(this).addClass("correct-answer");
            }
            if (currentInput.is(":checked") && val !== item.correct) {
              $(this).addClass("wrong-answer");
            }
          });

          if (selectedValue === item.correct) {
            score++;
          }

          // SHOW EXPLANATION
          const explanationBox = $(`#card-${i} .explanation`);
          if (selectedValue === item.correct) {
            explanationBox.html(
              `<span class="text-success">✔ Correct.</span> ${item.explanation}`,
            );
          } else {
            explanationBox.html(
              `<span class="text-danger">✘ Incorrect.</span> Correct answer: <b>${item.correct}</b><br>${item.explanation}`,
            );
          }
          explanationBox.removeClass("d-none");
        });

        const topicName = $("#topic-input").val();

        if ($(this).is(":visible")) {
          $.ajax({
            url: "api/save_quiz.php",
            method: "POST",
            contentType: "application/json",
            data: JSON.stringify({
              topic: topicName,
              questions: quizData,
              user_responses: userSelections,
              score: score,
            }),
            success: function (response) {
              console.log("Persistence successful:", response);
            },
            error: function (err) {
              console.error("Save failed. Check if api/save_quiz.php exists.");
            },
          });

          $("#final-score").text(score);
          $("#result-card").removeClass("d-none");
          $(this).remove();
          $('input[type="radio"]').attr("disabled", true);
        }
      });

      function loadHistory() {
        $.get("api/get_history.php", function (response) {
          let rows = "";
          if (response.success && response.data.length > 0) {
            response.data.forEach((item) => {
              rows += `
          <tr>
          <td>${item.topic}</td>
          <td><span class="badge bg-primary">${item.score_out_of_five}/5</span></td>
          <td>${new Date(item.created_at).toLocaleDateString()}</td>
          <td><button class="btn btn-sm btn-info text-white" onclick="reviewQuiz(${item.quiz_id})">Review</button></td>
          </tr>`;
            });
          } else {
            rows =
              '<tr><td colspan="4" class="text-center text-muted">No past quizzes found.</td></tr>';
          }
          $("#history-table-body").html(rows);
        });
      }

      function reviewQuiz(quizId) {
        $.get(`api/get_quiz_details.php?id=${quizId}`, function (response) {
          if (response.success) {
            quizData = response.questions;
            renderQuiz();
            $("#history-section").addClass("d-none");

            const userAnswers = JSON.parse(response.attempt.user_responses);
            Object.keys(userAnswers).forEach((index) => {
              $(`#q${index}${userAnswers[index]}`).prop("checked", true);
            });
            $("#submit-quiz-btn").hide().trigger("click");
            $("#history-section").addClass("d-none");
          }
        });
      }
    </script>
  </body>
</html>
